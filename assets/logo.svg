<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wish Code — App Icon

  Faithful redraw of the classic Bohr-atom "electron" shape the user
  uploaded (central nucleus + three tilted elliptical orbitals) in the
  Wish Code brand purple. Rounded-square background matches the macOS
  dock style so it reads as a native app tile at any size.

  Geometry is authored on a 1024×1024 grid for crisp rasterization.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep-to-bright purple radial to give the tile depth. -->
    <radialGradient id="wsh-bg" cx="50%" cy="44%" r="70%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="55%"  stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>

    <!-- Orbital stroke: subtle white→translucent gradient so the ellipses
         feel like light trails, not flat rings. -->
    <linearGradient id="wsh-orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Nucleus: bright purple-white core. -->
    <radialGradient id="wsh-nuc" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>

    <!-- Nucleus glow halo. -->
    <radialGradient id="wsh-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="60%"  stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- macOS-style rounded tile. Corner radius ≈ 22.5% of side, matching
       the Big Sur app-icon mask. -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#wsh-bg)"/>

  <!-- Soft nucleus halo so the atom reads against the dark corners. -->
  <circle cx="512" cy="512" r="360" fill="url(#wsh-halo)"/>

  <!-- Three tilted orbital ellipses, 60° apart, centered on the nucleus.
       Stroke tapered for a clean line at every size. -->
  <g fill="none" stroke="url(#wsh-orbit)" stroke-width="18" stroke-linecap="round">
    <ellipse cx="512" cy="512" rx="380" ry="150" transform="rotate(0   512 512)"/>
    <ellipse cx="512" cy="512" rx="380" ry="150" transform="rotate(60  512 512)"/>
    <ellipse cx="512" cy="512" rx="380" ry="150" transform="rotate(120 512 512)"/>
  </g>

  <!-- Three electrons, one per orbital, sitting at the orbit's far edge
       so the shape is visibly an atom rather than a plain sphere. -->
  <g fill="#ffffff">
    <!-- orbit 0° → electron at the +x tip -->
    <circle cx="892" cy="512" r="26"/>
    <!-- orbit 60° rotated → electron placed via rotated coords -->
    <circle cx="322" cy="183" r="26"/>
    <!-- orbit 120° rotated -->
    <circle cx="322" cy="841" r="26"/>
  </g>

  <!-- Nucleus on top. -->
  <circle cx="512" cy="512" r="96" fill="url(#wsh-nuc)"/>
</svg>
