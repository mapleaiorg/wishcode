name: Repository Housekeeping

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 13 * * 1'

permissions:
  contents: read

jobs:
  housekeeping:
    name: Housekeeping
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository housekeeping checks
        run: npm run housekeeping:check

      - name: TypeScript validation
        run: npm run typecheck

      - name: Renderer build
        run: npm run build

      - name: Electron build
        run: npm run build:electron
